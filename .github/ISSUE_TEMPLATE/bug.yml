name: Bug
description: Something is broken
title: "bug: <short description>"
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened
      placeholder: "When I do X, I see Y, but expected Z."
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device / browser
      placeholder: "iPhone 14, iOS Safari 18.2 — or Desktop Chrome 130"
  - type: textarea
    id: console
    attributes:
      label: Console / network errors (if any)
      render: text
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "1 — blocks Goal 1 / shipping"
        - "2 — broken feature, workaround exists"
        - "3 — visual / minor"
