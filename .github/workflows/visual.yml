name: Visual regression

on:
  pull_request:

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual:
    name: playwright pixel-diff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        # No explicit version — picks up from package.json#packageManager.

      - uses: actions/setup-node@v6
        with:
          # pnpm 11 requires Node >= 22.13 (uses node:sqlite builtin).
          # Matches the verify job in ci.yml.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Run visual regression tests
        run: pnpm exec playwright test -c playwright.visual.config.ts

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-results
          path: test/visual-fixtures/test-results
          if-no-files-found: ignore
          retention-days: 14
